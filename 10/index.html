<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event-Driven Theme Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Theme Manager</h1>
    
    <div class="controls">
        <label>Background Color: <input type="color" id="bgColor"></label><br>
        <label>Text Color: <input type="color" id="textColor"></label><br>
        <label>Button Color: <input type="color" id="btnColor"></label><br><br>
        <button id="resetBtn">Reset Theme</button>
    </div>

    <div class="content">
        <p>This is a sample paragraph to demonstrate theme changes.</p>
        <button>Sample Button</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

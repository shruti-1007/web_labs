<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Calculator</h1>
    <div class="body">
      <div class="screen">
        <div class="history"></div>
        <div class="now"></div>
      </div>
      <div class="main">
        <div class="row">
          <span><button id="openparanthesis">(</button></span>
          <span><button id="rightparanthesis">)</button></span>
          <span><button id="percent">%</button></span>
          <span><button id="ac">AC</button></span>
        </div>
        <div class="row">
          <span><button id="7">7</button></span>
          <span><button id="8">8</button></span>
          <span><button id="9">9</button></span>
          <span><button id="div">/</button></span>
        </div>
        <div class="row">
          <span><button id="4">4</button></span>
          <span><button id="5">5</button></span>
          <span><button id="6">6</button></span>
          <span><button id="mul">*</button></span>
        </div>
        <div class="row">
          <span><button id="1">1</button></span>
          <span><button id="2">2</button></span>
          <span><button id="3">3</button></span>
          <span><button id="sub">-</button></span>
        </div>
        <div class="row">
          <span><button id="0">0</button></span>
          <span><button id="dec">.</button></span>
          <span><button id="equals">=</button></span>
          <span><button id="add">+</button></span>
        </div>
        <div class="row">
          <span><button id="del">DEL</button></span>
          <span><button id="clearhistory">Clear History</button></span>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
